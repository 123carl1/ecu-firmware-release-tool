name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows-test-build:
    name: Windows test and build
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout complete history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Require clean tracked inputs
        shell: pwsh
        run: |
          if (git status --porcelain) { throw 'Checkout is not clean.' }
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11.9'
          cache: pip
      - name: Install locked dependencies
        run: python -m pip install --require-hashes -r requirements-release.lock
      - name: Bootstrap pinned release tools
        shell: pwsh
        run: pwsh.exe -NoProfile -ExecutionPolicy Bypass -File ./scripts/bootstrap_release_tools.ps1
      - name: Scan current tree and complete history
        shell: pwsh
        run: |
          & 'D:\software\gitleaks\8.30.1\gitleaks.exe' dir . --config=.gitleaks.toml --redact
          & 'D:\software\gitleaks\8.30.1\gitleaks.exe' git . --log-opts="--all" --config=.gitleaks.toml --redact
      - name: Run all tests
        shell: pwsh
        run: |
          $env:PYTHONPATH=(Resolve-Path 'src').Path
          $env:QT_QPA_PLATFORM='offscreen'
          python -m pytest -q
      - name: Build and audit installer
        shell: pwsh
        run: >-
          pwsh.exe -NoProfile -ExecutionPolicy Bypass
          -File ./scripts/build_windows_installer.ps1
          -PythonPath (Get-Command python).Source
          -IsccPath 'D:\software\InnoSetup\6.7.3\ISCC.exe'
      - name: Require audited outputs
        shell: pwsh
        run: |
          Get-Item .\dist\release-audit.json | Out-Null
          Get-Item .\dist\installer\EcuReleaseTool_Setup_*.exe | Out-Null
      - name: Upload audited CI outputs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: windows-audited-build
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/release-audit.json
            dist/installer/EcuReleaseTool_Setup_*.exe
            THIRD_PARTY_NOTICES.txt
